name: Agente Publicador de Shows

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publicar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install gspread google-auth

      - name: Executar agente publicador
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SHEETS_ID: ${{ secrets.SHEETS_ID }}
        run: python scripts/publicar.py

      - name: Commit e push
        run: |
          git config user.name 'ShowsBR Bot'
          git config user.email 'bot@showsbr.com.br'
          git add public/data/shows/ public/shows/ public/sitemap.xml
          git diff --staged --quiet || git commit -m 'chore: atualiza shows e páginas SEO'
          git push
